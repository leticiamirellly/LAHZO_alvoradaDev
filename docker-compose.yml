services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sms
      POSTGRES_PASSWORD: sms
      POSTGRES_DB: sms
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms -d sms"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      DATABASE_URL: postgresql://sms:sms@postgres:5432/sms?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: "3000"
      TWILIO_FROM_PHONE: ${TWILIO_FROM_PHONE:?TWILIO_FROM_PHONE is required}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:?TWILIO_ACCOUNT_SID is required}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_API_KEY_SID: ${TWILIO_API_KEY_SID:-}
      TWILIO_API_KEY_SECRET: ${TWILIO_API_KEY_SECRET:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_STATUS_CALLBACK_URL: ${TWILIO_STATUS_CALLBACK_URL:-}
    ports:
      - "${API_HOST_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgresql://sms:sms@postgres:5432/sms?schema=public
      REDIS_URL: redis://redis:6379
      TWILIO_FROM_PHONE: ${TWILIO_FROM_PHONE:?TWILIO_FROM_PHONE is required}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:?TWILIO_ACCOUNT_SID is required}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_API_KEY_SID: ${TWILIO_API_KEY_SID:-}
      TWILIO_API_KEY_SECRET: ${TWILIO_API_KEY_SECRET:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_STATUS_CALLBACK_URL: ${TWILIO_STATUS_CALLBACK_URL:-}
      WORKER_CONCURRENCY: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5174:5173"
    depends_on:
      - api

volumes:
  postgres-data:
